<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{.Title}} — Tyler Lugger</title>
<meta name="description" content="{{.Summary}}">
<meta property="og:title" content="{{.Title}}">
<meta property="og:description" content="{{.Summary}}">
<meta property="og:type" content="article">
<meta property="og:url" content="/posts/{{.Slug}}">
{{if .Image}}<meta property="og:image" content="{{.Image}}">{{end}}
<meta name="twitter:card" content="{{if .Image}}summary_large_image{{else}}summary{{end}}">
<meta name="twitter:title" content="{{.Title}}">
<meta name="twitter:description" content="{{.Summary}}">
{{if .Image}}<meta name="twitter:image" content="{{.Image}}">{{end}}
<meta name="theme-color" content="#1a1a1e">
<link rel="icon" type="image/png" href="/static/favicon/favicon-96x96.png" sizes="96x96">
<link rel="icon" type="image/svg+xml" href="/static/favicon/favicon.svg">
<link rel="shortcut icon" href="/static/favicon/favicon.ico">
<link rel="apple-touch-icon" sizes="180x180" href="/static/favicon/apple-touch-icon.png">
<link rel="manifest" href="/static/favicon/site.webmanifest">
<link rel="stylesheet" href="/static/base.css">
<link rel="alternate" type="application/rss+xml" title="Tyler's blog" href="/rss.xml">
<link href="https://fonts.googleapis.com/css?family=Raleway&display=swap" rel="stylesheet">
</head>
<body>
<header class="site-header">
<a href="/" class="home-link">← all posts</a>
</header>
<main class="post">
<article>
<header class="post-header">
<h1>{{.Title}}</h1>
<time datetime="{{.Date.Format "2006-01-02"}}">{{.Date.Format "January 2, 2006"}}</time>
</header>
<div class="post-body">{{.Content}}</div>
</article>
</main>
<footer class="site-footer">
<a href="/rss.xml">RSS</a> · <a href="https://notnottyler.com">notnottyler.com</a>
</footer>
</body>
</html>
